services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_CTX=8192
    expose:
      - "11434"
    networks:
      - internal
      
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - .env
    expose:
      - "18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
    networks:
      - traefik_web
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_web"
      - "traefik.http.routers.openclaw.rule=Host(`oc.alexandrecadene.com`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls=true"
      - "traefik.http.routers.openclaw.tls.certresolver=myresolver"
      - "traefik.http.routers.openclaw.middlewares=SecHeaders@file,openclaw-auth@file"
      - "traefik.http.middlewares.openclaw-auth.basicauth.users=alex:$$2y$$05$$QyHncXKNV6PNtItjTavP6eEAsqp/7EC0XlNt8eb6T3XQ5XwBSpMta"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"

networks:
  traefik_web:
    external: true
  internal:
    internal: true

volumes:
  ollama_data:
  openclaw_data:
