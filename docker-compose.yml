services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - web

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    depends_on:
      - ollama
    expose:
      - "18789"
    volumes:
      - openclaw_data:/home/node/.openclaw
      # Optionnel si tu veux piloter la conf par fichier dès le départ
      # - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_web"

      - "traefik.http.routers.openclaw.rule=Host(`oc.alexandrecadene.com`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls=true"
      - "traefik.http.routers.openclaw.tls.certresolver=myresolver"

      - "traefik.http.routers.openclaw.middlewares=SecHeaders@file,openclaw-auth@file"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"

networks:
  web:
    external: true
    name: traefik_web

volumes:
  ollama_data:
  openclaw_data:
